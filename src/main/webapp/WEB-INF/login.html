<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – Project Management</title>

  <link rel="stylesheet"/>
  <script src="../javascript/login.js" defer></script>
  <style>
    /* ══════════════════════════════════════════
       DESIGN TOKENS  (identici ad admin_home)
    ══════════════════════════════════════════ */
    :root {
      --text-xs:   clamp(0.75rem,  0.7rem  + 0.25vw, 0.875rem);
      --text-sm:   clamp(0.875rem, 0.8rem  + 0.35vw, 1rem);
      --text-base: clamp(1rem,     0.95rem + 0.25vw, 1.125rem);
      --text-lg:   clamp(1.125rem, 1rem    + 0.75vw, 1.5rem);
      --text-xl:   clamp(1.5rem,   1.2rem  + 1.25vw, 2.25rem);

      --space-1: 0.25rem; --space-2: 0.5rem;  --space-3: 0.75rem;
      --space-4: 1rem;    --space-5: 1.25rem; --space-6: 1.5rem;
      --space-8: 2rem;    --space-10: 2.5rem; --space-12: 3rem;

      --color-bg:             #f7f6f2;
      --color-surface:        #f9f8f5;
      --color-surface-2:      #fbfbf9;
      --color-surface-offset: #f3f0ec;
      --color-divider:        #dcd9d5;
      --color-border:         #d4d1ca;
      --color-text:           #28251d;
      --color-text-muted:     #7a7974;
      --color-text-faint:     #bab9b4;
      --color-primary:        #2563eb;
      --color-primary-hover:  #1d4ed8;
      --color-primary-active: #1e3a8a;
      --color-primary-hl:     #dbeafe;
      --color-error:          #a12c7b;
      --color-error-bg:       #e0ced7;

      --radius-sm: 0.375rem; --radius-md: 0.5rem;
      --radius-lg: 0.75rem;  --radius-xl: 1rem;

      --shadow-sm: 0 1px 2px oklch(0.2 0.01 80 / 0.06);
      --shadow-md: 0 4px 12px oklch(0.2 0.01 80 / 0.08);
      --shadow-lg: 0 12px 32px oklch(0.2 0.01 80 / 0.12);

      --font-body:    Arial, 'Helvetica Neue', sans-serif;
      --font-display: 'Instrument Serif', Georgia, serif;
      --transition:   180ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* ══════════════════════════════════════════
       BASE
    ══════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; }
    body {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: var(--space-6);
      font-family: var(--font-body);
      font-size: var(--text-base);
      color: var(--color-text);
      /* Stesso tono del bg dell'admin: beige caldo con sfumatura sottile */
      background: linear-gradient(160deg, var(--color-primary-hl) 0%, var(--color-bg) 35%);
    }
    input, button { font: inherit; color: inherit; }
    :focus-visible {
      outline: 2px solid var(--color-primary);
      outline-offset: 3px;
      border-radius: var(--radius-sm);
    }

    /* ══════════════════════════════════════════
       CARD
    ══════════════════════════════════════════ */
    .login-card {
      width: 100%;
      max-width: 420px;
      background: var(--color-surface);
      border: 1px solid oklch(from var(--color-text) l c h / 0.10);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      padding: var(--space-8);
    }

    /* ── Brand mark ── */
    .brand {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin-bottom: var(--space-6);
    }
    .brand-icon {
      width: 38px; height: 38px;
      display: flex; align-items: center; justify-content: center;
      background: var(--color-primary-hl);
      border-radius: var(--radius-md);
      color: var(--color-primary);
      flex-shrink: 0;
    }
    .brand-name {
      font-family: var(--font-display);
      font-size: var(--text-lg);
      font-weight: 400;
      line-height: 1.2;
      color: var(--color-text);
    }
    .brand-name span {
      display: block;
      font-family: var(--font-body);
      font-size: var(--text-xs);
      font-weight: 400;
      color: var(--color-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: 1px;
    }

    /* ── Heading ── */
    .login-card h1 {
      font-family: var(--font-display);
      font-size: var(--text-xl);
      font-weight: 400;
      line-height: 1.2;
      margin-bottom: var(--space-2);
    }
    .subtitle {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      margin-bottom: var(--space-6);
      max-width: 36ch;
    }

    /* ── Alert errore ── */
    .alert-error {
      display: flex;
      align-items: flex-start;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      background: var(--color-error-bg);
      color: var(--color-error);
      border-radius: var(--radius-md);
      font-size: var(--text-sm);
      margin-bottom: var(--space-5);
    }
    .alert-error svg { flex-shrink: 0; margin-top: 2px; }

    /* ── Form fields (stessa struttura dell'admin) ── */
    .field { margin-bottom: var(--space-4); }
    .field:last-of-type { margin-bottom: var(--space-5); }

    label {
      display: block;
      font-size: var(--text-xs);
      font-weight: 500;
      color: var(--color-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: var(--space-1);
    }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: var(--space-2) var(--space-3);
      background: var(--color-surface-2);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      font-size: var(--text-sm);
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    input[type="text"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }
    input::placeholder { color: var(--color-text-faint); }

    /* ── Submit button (identico al btn-primary dell'admin) ── */
    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      width: 100%;
      padding: var(--space-3) var(--space-6);
      background: var(--color-primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      font-size: var(--text-sm);
      font-weight: 500;
      cursor: pointer;
      transition: background var(--transition), box-shadow var(--transition);
    }
    .btn-primary:hover  { background: var(--color-primary-hover); }
    .btn-primary:active { background: var(--color-primary-active); }

    /* ── Hint footer ── */
    .hint {
      margin-top: var(--space-5);
      padding-top: var(--space-4);
      border-top: 1px solid var(--color-divider);
      font-size: var(--text-xs);
      color: var(--color-text-faint);
      text-align: center;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <main class="login-card">

    <!-- Brand mark -->
    <div class="brand">
      <div class="brand-icon" aria-hidden="true">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.8">
          <rect x="2" y="3" width="20" height="14" rx="2"/>
          <path d="M8 21h8M12 17v4M7 8h10M7 12h6"/>
        </svg>
      </div>
      <div class="brand-name">
        Project Management
        <span>TIW 2025–26</span>
      </div>
    </div>

    <h1>Sign in</h1>
    <p class="subtitle">Enter your credentials to access the application.</p>

    <!-- Errore login (gestito da login.js) -->
    <div id="alert-error" class="alert-error" role="alert" hidden="hidden">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" aria-hidden="true">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span id="error-message"></span>
    </div>

    <form id="login-form" novalidate>

      <div class="field">
        <label for="username">Username</label>
        <input id="username" name="username" type="text"
               required maxlength="45" autocomplete="username"
               placeholder="e.g. mario.rossi"/>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password"
               required maxlength="45" autocomplete="current-password"
               placeholder="••••••••"/>
      </div>

      <button type="submit" class="btn-primary">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
          <polyline points="10 17 15 12 10 7"/>
          <line x1="15" y1="12" x2="3" y2="12"/>
        </svg>
        Sign in
      </button>
    </form>

    <p class="hint">If you experience any issues, please contact the system administrator.</p>
  </main>
</body>
</html>
